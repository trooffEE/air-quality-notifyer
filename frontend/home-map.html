<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choose Sensors</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ39LfxI4tT56NLRB3azRYssNQ+uCwM=" crossorigin="">
  <style>
    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-pane > svg,
    .leaflet-pane > canvas,
    .leaflet-zoom-box,
    .leaflet-image-layer,
    .leaflet-layer {
      position: absolute;
      left: 0;
      top: 0;
    }
    .leaflet-container {
      overflow: hidden;
      background: #ddd;
      outline-offset: 1px;
    }
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow {
      user-select: none;
      -webkit-user-drag: none;
    }
    .leaflet-tile::selection {
      background: transparent;
    }
    .leaflet-safari .leaflet-tile {
      image-rendering: -webkit-optimize-contrast;
    }
    .leaflet-zoom-box {
      width: 0;
      height: 0;
      box-sizing: border-box;
      z-index: 800;
    }
    .leaflet-pane { z-index: 400; }
    .leaflet-tile-pane { z-index: 200; }
    .leaflet-overlay-pane { z-index: 400; }
    .leaflet-shadow-pane { z-index: 500; }
    .leaflet-marker-pane { z-index: 600; }
    .leaflet-tooltip-pane { z-index: 650; }
    .leaflet-popup-pane { z-index: 700; }
    .leaflet-map-pane canvas { z-index: 100; }
    .leaflet-map-pane svg { z-index: 200; }
    .leaflet-vml-shape {
      width: 1px;
      height: 1px;
    }
    .lvml {
      behavior: url(#default#VML);
      display: inline-block;
      position: absolute;
    }
    .leaflet-control {
      position: relative;
      z-index: 800;
      pointer-events: visiblePainted;
      pointer-events: auto;
    }
    .leaflet-top,
    .leaflet-bottom {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
    }
    .leaflet-top { top: 0; }
    .leaflet-right { right: 0; }
    .leaflet-bottom { bottom: 0; }
    .leaflet-left { left: 0; }
    .leaflet-control {
      float: left;
      clear: both;
    }
    .leaflet-right .leaflet-control {
      float: right;
    }
    .leaflet-top .leaflet-control {
      margin-top: 10px;
    }
    .leaflet-bottom .leaflet-control {
      margin-bottom: 10px;
    }
    .leaflet-left .leaflet-control {
      margin-left: 10px;
    }
    .leaflet-right .leaflet-control {
      margin-right: 10px;
    }
    .leaflet-fade-anim .leaflet-popup {
      opacity: 0;
      transition: opacity 0.2s linear;
    }
    .leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
      opacity: 1;
    }
    .leaflet-zoom-animated {
      transform-origin: 0 0;
    }
    .leaflet-zoom-anim .leaflet-zoom-animated {
      transition: transform 0.25s cubic-bezier(0, 0, 0.25, 1);
    }
    .leaflet-interactive {
      cursor: pointer;
    }
    .leaflet-grab {
      cursor: grab;
    }
    .leaflet-dragging .leaflet-grab,
    .leaflet-dragging .leaflet-marker-draggable {
      cursor: move;
      cursor: grabbing;
    }
    .leaflet-control-attribution {
      padding: 0 5px;
      color: #333;
      background: rgba(255, 255, 255, 0.8);
      font-size: 11px;
    }
    .leaflet-control-attribution a {
      color: #0078a8;
      text-decoration: none;
    }
    .leaflet-control-zoom a {
      display: block;
      width: 26px;
      height: 26px;
      line-height: 26px;
      text-align: center;
      text-decoration: none;
      color: #000;
      background: #fff;
      border-bottom: 1px solid #ccc;
    }
    .leaflet-control-zoom a:last-child {
      border-bottom: 0;
    }
    .leaflet-control-zoom {
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .leaflet-popup {
      position: absolute;
      text-align: center;
      margin-bottom: 20px;
    }
    .leaflet-popup-content-wrapper {
      padding: 1px;
      text-align: left;
      border-radius: 8px;
      background: white;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.4);
    }
    .leaflet-popup-content {
      margin: 13px 19px;
      line-height: 1.3;
      font-size: 13px;
      min-height: 1px;
    }
    .leaflet-popup-tip-container {
      width: 40px;
      height: 20px;
      position: absolute;
      left: 50%;
      margin-left: -20px;
      overflow: hidden;
      pointer-events: none;
    }
    .leaflet-popup-tip {
      width: 17px;
      height: 17px;
      padding: 1px;
      margin: -10px auto 0;
      transform: rotate(45deg);
      background: white;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.4);
    }
    .leaflet-popup-close-button {
      position: absolute;
      top: 0;
      right: 0;
      padding: 4px 4px 0 0;
      border: none;
      text-align: center;
      width: 18px;
      height: 14px;
      font: 16px/14px Tahoma, Verdana, sans-serif;
      color: #757575;
      text-decoration: none;
      background: transparent;
    }
    :root { --app-height: 100dvh; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #18201b;
      overscroll-behavior: none;
    }
    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--app-height);
      min-height: 100dvh;
    }
    .panel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 1000;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 6px 24px rgba(24, 32, 27, 0.18);
    }
    .status {
      min-width: 0;
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: #1f7a4d;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    button:disabled { background: #9aa39d; }
    .empty {
      position: fixed;
      inset: 0;
      z-index: 900;
      display: none;
      place-items: center;
      padding: 20px 20px 96px;
      text-align: center;
      font-size: 16px;
      line-height: 1.45;
      color: #4e5b53;
      background: rgba(247, 247, 244, 0.72);
      pointer-events: none;
    }
    .empty span {
      max-width: 280px;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 6px 24px rgba(24, 32, 27, 0.14);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="empty" class="empty"><span>На данный момент активных датчиков нет.</span></div>
  <div class="panel">
    <div id="status" class="status">Загрузка датчиков...</div>
    <button id="confirm" disabled>Выбрать датчики!</button>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const initData = tg ? tg.initData : "";
    const selected = new Set();
    const statusEl = document.getElementById("status");
    const confirmEl = document.getElementById("confirm");
    const emptyEl = document.getElementById("empty");
    const map = L.map("map", { zoomControl: true }).setView([55.354, 86.087], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    function syncViewportHeight() {
      if (tg && tg.viewportHeight) {
        document.documentElement.style.setProperty("--app-height", tg.viewportHeight + "px");
      } else {
        document.documentElement.style.setProperty("--app-height", window.innerHeight + "px");
      }
    }

    function syncMapSize() {
      syncViewportHeight();
      requestAnimationFrame(() => map.invalidateSize(false));
      setTimeout(() => map.invalidateSize(false), 250);
    }

    syncMapSize();
    window.addEventListener("resize", syncMapSize);
    window.addEventListener("orientationchange", syncMapSize);
    if (tg) {
      tg.onEvent("viewportChanged", syncMapSize);
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function renderSelectionStatus(total) {
      if (total === 0) {
        setStatus("На данный момент активных датчиков нет.");
        confirmEl.disabled = true;
        return;
      }

      const count = selected.size;
      setStatus(count === 0 ? "Нажмите на маркеры, чтобы выбрать датчики." : "Выбрано: " + count);
      confirmEl.disabled = count === 0;
    }

    function toggleMarker(sensor, marker, total) {
      if (selected.has(sensor.api_id)) {
        selected.delete(sensor.api_id);
        marker.setOpacity(0.65);
      } else {
        selected.add(sensor.api_id);
        marker.setOpacity(1);
      }
      renderSelectionStatus(total);
    }

    async function loadSensors() {
      const response = await fetch("/api/map/alive-sensors", {
        headers: { "X-Telegram-Init-Data": initData }
      });
      if (!response.ok) {
        throw new Error("Не удалось загрузить датчики.");
      }

      const sensors = await response.json();
      if (sensors.length === 0) {
        emptyEl.style.display = "grid";
        renderSelectionStatus(0);
        syncMapSize();
        return;
      }

      const bounds = [];
      for (const sensor of sensors) {
        const marker = L.marker([sensor.lat, sensor.lon], { opacity: 0.65 }).addTo(map);
        marker.bindPopup((sensor.address || "Sensor") + "<br>" + (sensor.district || ""));
        marker.on("click", () => toggleMarker(sensor, marker, sensors.length));
        bounds.push([sensor.lat, sensor.lon]);
      }

      map.fitBounds(bounds, { padding: [28, 70], maxZoom: 14 });
      renderSelectionStatus(sensors.length);
      syncMapSize();
    }

    confirmEl.addEventListener("click", async () => {
      confirmEl.disabled = true;
      setStatus("Сохранение...");

      const response = await fetch("/api/map/home-selection", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Telegram-Init-Data": initData
        },
        body: JSON.stringify({ sensor_api_ids: Array.from(selected) })
      });

      if (!response.ok) {
        setStatus("Не удалось сохранить выбор. Пожалуйста, попробуйте еще раз.");
        confirmEl.disabled = false;
        return;
      }

      setStatus("Сохранено.");
      setTimeout(() => {
        if (tg) {
          tg.close();
        }
      }, 700);
    });

    loadSensors().catch((error) => {
      setStatus(error.message);
      confirmEl.disabled = true;
    });
  </script>
</body>
</html>
